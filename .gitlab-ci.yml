stages:
  - validate
  - push-artifact

variables:
  HARBOR_REGISTRY: 127.0.0.1:8443
  HARBOR_PROJECT: platform
  ARTIFACT_NAME: k8s-addons-flux
  REPO_PATH: ./

# ─────────────────────────────────────────
# STAGE 1 — Validate YAML before pushing
# ─────────────────────────────────────────
validate-kustomize:
  stage: validate
  image:
    name: registry.k8s.io/kustomize/kustomize:v5.3.0
    entrypoint: [""]
  script:
    - kustomize build ${REPO_PATH}/common/               > /dev/null
    - kustomize build ${REPO_PATH}/common-extras/        > /dev/null
    - kustomize build ${REPO_PATH}/extras/               > /dev/null
    - kustomize build ${REPO_PATH}/observability/        > /dev/null
    - kustomize build ${REPO_PATH}/observability-agents/ > /dev/null
    - kustomize build ${REPO_PATH}/registry/             > /dev/null
    - echo "All kustomizations validated successfully"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─────────────────────────────────────────
# STAGE 2 — Push repo as OCI artifact to Harbor
# ─────────────────────────────────────────
push-oci-artifact:
  stage: push-artifact
  image:
    name: alpine:3.19
    entrypoint: [""]
  before_script:
    # Install oras
    - apk add --no-cache curl tar
    - curl -sLO https://github.com/oras-project/oras/releases/download/v1.2.0/oras_1.2.0_linux_amd64.tar.gz
    - tar -zxf oras_1.2.0_linux_amd64.tar.gz oras
    - mv oras /usr/local/bin/oras
    # Updated robot account prefix to $platform
    - HARBOR_USER='robot$platform+testingci'
    - echo "Using HARBOR_USER=${HARBOR_USER}"
    # Test credentials (using the platform project API endpoint)
    - curl -k -u "${HARBOR_USER}:${HARBOR_PASSWORD}" "https://${HARBOR_REGISTRY}/api/v2.0/projects/platform" | head -c 300
    - echo ""
    # Write docker config with base64 auth
    - mkdir -p ~/.docker
    - AUTH=$(echo -n "${HARBOR_USER}:${HARBOR_PASSWORD}" | base64)
    - echo "{\"auths\":{\"${HARBOR_REGISTRY}\":{\"auth\":\"${AUTH}\"}}}" > ~/.docker/config.json
  script:
    # Push OCI artifact
    - oras push ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${ARTIFACT_NAME}:${CI_COMMIT_SHORT_SHA} --insecure --annotation "org.opencontainers.image.source=${CI_PROJECT_URL}" --annotation "org.opencontainers.image.revision=${CI_COMMIT_SHA}" ${REPO_PATH}
    # Tag as latest
    - oras tag ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${ARTIFACT_NAME}:${CI_COMMIT_SHORT_SHA} latest --insecure
    - echo "Pushed ${ARTIFACT_NAME}:${CI_COMMIT_SHORT_SHA} tagged as latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  environment:
    name: production
