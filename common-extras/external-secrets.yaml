apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    pod-security.kubernetes.io/enforce: privileged
    kyverno.io/exclude-rule: "true"
spec: {}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: external-secrets-selfsigned
  namespace: external-secrets
spec:
  selfSigned: {}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1m
  timeout: 20m
  chart:
    spec:
      chart: external-secrets
      version: 0.18.2
      sourceRef:
        kind: HelmRepository
        name: local-harbor-helm-repo
        namespace: flux-system
      interval: 5m
  releaseName: external-secrets
  dependsOn:
  - name: kube-prometheus
    namespace: kube-prometheus
  - name: cert-manager
    namespace: cert-manager
  - name: kyverno
    namespace: kyverno
  install:
    crds: CreateReplace
  valuesFrom:
  - kind: ConfigMap
    name: external-secrets-values
  postRenderers:
  - kustomize:
      images:
      - name: oci.external-secrets.io/external-secrets/external-secrets:v0.18.2
        newName: ${registry_host}/platform/external-secrets-images
        digest: sha256:b9584ef389ddbe0918de80a0b2c2b93188c4b6f0862570ce9f50f3feaedc497a
