replicaCount: 1
leaderElect: false
installCRDs: true
extraVolumes:
- configMap:
    items:
    - key: ca-certificates.crt
      path: ca-certificates.crt
    name: safaricomet.net
  name: etc-ssl-certs
extraVolumeMounts:
- name: etc-ssl-certs
  mountPath: /etc/ssl/certs
serviceMonitor:
  enabled: true
webhook:
  certManager:
    enabled: true
    addInjectorAnnotations: true
    cert:
      create: true
      issuerRef:
        group: cert-manager.io
        kind: Issuer
        name: external-secrets-selfsigned
  extraVolumes:
  - configMap:
      items:
      - key: ca-certificates.crt
        path: ca-certificates.crt
      name: safaricomet.net
    name: etc-ssl-certs
  extraVolumeMounts:
  - name: etc-ssl-certs
    mountPath: /etc/ssl/certs
certController:
  create: true
  extraVolumes:
  - configMap:
      items:
      - key: ca-certificates.crt
        path: ca-certificates.crt
      name: safaricomet.net
    name: etc-ssl-certs
  extraVolumeMounts:
  - name: etc-ssl-certs
    mountPath: /etc/ssl/certs
