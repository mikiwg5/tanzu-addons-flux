apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- kube-prometheus.yaml
- kyverno.yaml
- kyverno-policies.yaml
- cert-manager.yaml
- trust-manager.yaml
configMapGenerator:
- files:
  - values.yaml=helm-values/kube-prometheus.yaml
  name: kube-prometheus-values
  namespace: kube-prometheus
  options:
    disableNameSuffixHash: true
- files:
  - values.yaml=helm-values/kyverno.yaml
  name: kyverno-values
  namespace: kyverno
  options:
    disableNameSuffixHash: true
- files:
  - values.yaml=helm-values/kyverno-policies.yaml
  name: kyverno-policies-values
  namespace: kyverno
  options:
    disableNameSuffixHash: true
- files:
  - values.yaml=helm-values/cert-manager.yaml
  name: cert-manager-values
  namespace: cert-manager
  options:
    disableNameSuffixHash: true
- files:
  - values.yaml=helm-values/trust-manager.yaml
  name: trust-manager-values
  namespace: cert-manager
  options:
    disableNameSuffixHash: true
