apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno-policies
  namespace: kyverno
spec:
  interval: 1m
  timeout: 20m
  chart:
    spec:
      chart: kyverno-policies
      version: 3.3.1
      sourceRef:
        kind: HelmRepository
        name: local-harbor-helm-repo
        namespace: flux-system
      interval: 5m
  releaseName: kyverno-policies
  dependsOn:
  - name: kyverno
    namespace: kyverno
  valuesFrom:
  - kind: ConfigMap
    name: kyverno-policies-values
