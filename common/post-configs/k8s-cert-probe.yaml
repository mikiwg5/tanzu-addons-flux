apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: k8s-apiserver-cert
  namespace: kube-prometheus
spec:
  module: http_2xx
  prober:
    url: ${tenant}-blackbox-exporter.kube-prometheus.svc:19115
  tlsConfig:
    insecureSkipVerify: true
  targets:
    staticConfig:
      labels:
        service: k8s-apiserver-cert
      static:
      - https://kubernetes.default.svc/healthz
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k8s-apiserver-cert
  namespace: kube-prometheus
spec:
  endpoints:
  - port: http
    path: /probe
    interval: 60s
    params:
      module:
      - http_2xx
      target:
      - https://kubernetes.default.svc/healthz
    relabelings:
    - sourceLabels: [ __param_target ]
      targetLabel: target
  namespaceSelector:
    matchNames:
    - kube-prometheus
  selector:
    matchLabels:
      app.kubernetes.io/component: blackbox-exporter
      app.kubernetes.io/instance: kube-prometheus
      app.kubernetes.io/name: kube-prometheus
