apiVersion: v1
kind: Namespace
metadata:
  name: hamle
  labels:
    pod-security.kubernetes.io/enforce: privileged
    kyverno.io/exclude-rule: "true"
spec: {}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hamle
  namespace: hamle
spec:
  interval: 1m
  timeout: 20m
  chart:
    spec:
      chart: hamle
      version: 0.4.5
      sourceRef:
        kind: HelmRepository
        name: local-harbor-helm-repo
        namespace: flux-system
      interval: 5m
  releaseName: hamle
  valuesFrom:
  - kind: ConfigMap
    name: hamle-values
