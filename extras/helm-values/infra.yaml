replicas: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
resources:
  requests:
    cpu: 64m
    memory: 128Mi
  limits:
    cpu: 256m
    memory: 512Mi
config:
  accessKeySecret: infra-agent-access-key
  name: ${datacenter}-${tenant}-tkc
  server:
    url: login-k8s.safaricomet.net
env:
- name: INFRA_LOG_LEVEL
  value: debug
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
volumeMounts:
- mountPath: /etc/ssl/certs/
  name: ca-cert
volumes:
- configMap:
    items:
    - key: ca-certificates.crt
      path: ca-certificates.crt
    name: safaricomet.net
  name: ca-cert
