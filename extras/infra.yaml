apiVersion: v1
kind: Namespace
metadata:
  name: infra
  labels:
    pod-security.kubernetes.io/enforce: privileged
    kyverno.io/exclude-rule: "true"
spec: {}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infra
  namespace: infra
spec:
  interval: 1m
  timeout: 20m
  chart:
    spec:
      chart: infra
      version: 0.1.2
      sourceRef:
        kind: HelmRepository
        name: local-harbor-helm-repo
        namespace: flux-system
      interval: 5m
  releaseName: infra
  dependsOn:
  - name: trust-manager
    namespace: cert-manager
  valuesFrom:
  - kind: ConfigMap
    name: infra-values
  postRenderers:
  - kustomize:
      images:
      - name: infrahq/infra:0.21.0
        newName: ${registry_host}.safaricomet.net/platform/infra-images
        digest: sha256:5bc28fad1d3ae844adf72b1d5e02c0883116afb77fef90c497eb83c21059b74c
