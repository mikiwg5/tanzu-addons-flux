apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- adcs-issuer.yaml
- splunk-otel-collector.yaml
- infra.yaml
- hamle.yaml
- container-storage-modules.yaml
- contour.yaml
configMapGenerator:
- files:
  - values.yaml=helm-values/adcs-issuer.yaml
  name: adcs-issuer-values
  namespace: cert-manager
  options:
    disableNameSuffixHash: true
- files:
  - values.yaml=helm-values/splunk-otel-collector.yaml
  name: splunk-values
  namespace: splunk
  options:
    disableNameSuffixHash: true
- files:
  - config.yaml=helm-values/splunk-otel-collector-extra-config.yaml
  name: splunk-otel-collector-extra-config
  namespace: splunk
  options:
    disableNameSuffixHash: true
- files:
  - config.yaml=helm-values/splunk-otel-collector-cluster-receiver-extra-config.yaml
  name: splunk-otel-collector-cluster-receiver-extra-config
  namespace: splunk
  options:
    disableNameSuffixHash: true
- files:
  - values.yaml=helm-values/hamle.yaml
  name: hamle-values
  namespace: hamle
  options:
    disableNameSuffixHash: true
- files:
  - values.yaml=helm-values/infra.yaml
  name: infra-values
  namespace: infra
  options:
    disableNameSuffixHash: true
- files:
  - values.yaml=helm-values/container-storage-modules.yaml
  name: isilon-values
  namespace: isilon
  options:
    disableNameSuffixHash: true
- files:
  - values.yaml=helm-values/contour.yaml
  name: contour-values
  namespace: contour
  options:
    disableNameSuffixHash: true
