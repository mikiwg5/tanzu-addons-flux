  - '*'
- apiGroups:
  - projectcontour.io
  resources:
  - httpproxies
  - httpproxies/status
  verbs:
  - '*'
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  verbs:
  - '*'
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  - apiservices
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tanzustepadmins-no-delete-role
  labels:
    app.infrahq.com/include-role: "true"
rules:
# View node status
- apiGroups: [ "" ]
  resources: [ "nodes" ]
  verbs: [ "get", "list", "watch" ]

# View and edit namespaces, but no delete
- apiGroups: [ "" ]
  resources: [ "namespaces" ]
  verbs: [ "get", "list", "watch", "create", "update", "patch" ]

# View everything (pods, deployments, etc.) but no delete
- apiGroups: [ "", "apps", "batch", "extensions", "networking.k8s.io", "autoscaling", "policy" ]
  resources:
  - "pods"
  - "pods/log"
  - "persistentvolumes"
  - "persistentvolumeclaims"
  - "services"
  - "configmaps"
  - "secrets"
  - "deployments"
  - "replicasets"
  - "daemonsets"
  - "statefulsets"
  - "jobs"
  - "cronjobs"
  - "ingresses"
  - "horizontalpodautoscalers"
  - "serviceaccounts"
  verbs: [ "get", "list", "watch", "create", "update", "patch" ]

# RBAC management (no delete)
- apiGroups: [ "rbac.authorization.k8s.io" ]
  resources:
  - "clusterroles"
  - "roles"
  - "clusterrolebindings"
  - "rolebindings"
  verbs: [ "get", "list", "watch", "create", "update", "patch" ]

# Allow viewing events
- apiGroups: [ "" ]
  resources: [ "events" ]
  verbs: [ "get", "list", "watch" ]

# Manage standard snapshots
- apiGroups: [ "snapshot.storage.k8s.io" ]
  resources: [ "volumesnapshots", "volumesnapshotcontents" ]
  verbs: [ "get", "list", "watch", "create", "delete" ]

# Manage VMware CNSDP snapshots
- apiGroups: [ "backupdriver.cnsdp.vmware.com" ]
  resources: [ "snapshots" ]
  verbs: [ "get", "list", "watch", "create", "delete" ]

# Allow access to metrics API
- apiGroups: [ "metrics.k8s.io" ]
  resources: [ "pods", "nodes" ]
  verbs: [ "get", "list", "watch" ]

# Allow viewing clusterpolicies
- apiGroups: [ "kyverno.io" ]
  resources: [ "clusterpolicies" ]
  verbs: [ "get", "list", "watch" ]
