apiVersion: v1
kind: Namespace
metadata:
  name: splunk
  labels:
    pod-security.kubernetes.io/enforce: privileged
    kyverno.io/exclude-rule: "true"
spec: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: bearertokens
  namespace: splunk
stringData:
  tokens: ${splunk_access_token}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: splunk-otel-collector
  namespace: splunk
spec:
  interval: 1m
  timeout: 40m
  chart:
    spec:
      chart: splunk-otel-collector
      version: 0.138.1
      sourceRef:
        kind: HelmRepository
        name: local-harbor-helm-repo
        namespace: flux-system
      interval: 5m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  releaseName: splunk-otel-collector
  dependsOn:
  - name: cert-manager
    namespace: cert-manager
  valuesFrom:
  - kind: ConfigMap
    name: splunk-values
  postRenderers:
  - kustomize:
      patches:
      - target:
          group: rbac.authorization.k8s.io
          version: v1
          kind: ClusterRole
          name: splunk-otel-collector-ta-clusterRole
        patch: |-
          - op: add
            path: /rules/0/resources/-
            value: probes
          - op: add
            path: /rules/0/resources/-
            value: scrapeconfigs
      - target:
          group: apps
          version: v1
          kind: DaemonSet
          name: splunk-otel-collector-agent
        patch: |-
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --config=/extra/config.yaml
          - op: add
            path: /spec/template/spec/shareProcessNamespace
            value: true
          - op: add
            path: /spec/template/spec/containers/-
            value:
              name: configmap-reloader
              image: ${registry_host}/platform/configmap-reload:v0.16.0
              args:
                - --volume-dir=/extra/
                - --target-process-name=otelcol
              volumeMounts:
              - name: extra-config
                mountPath: /extra
                readOnly: true
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                capabilities:
                  add: ["SYS_PTRACE"]
          - op: add
            path: /spec/template/spec/initContainers
            value: []
          - op: add
            path: /spec/template/spec/initContainers/-
            value:
              name: init-iptables
              image: ${registry_host}/platform/ubuntu:24.04
              command:
              - /bin/bash
              - -c
              - |
                #!/bin/bash
                # Define an array of ports to check and add rules for
                ports=(4317 4318)
                for port in "$${ports[@]}"; do
                  if ! chroot /host iptables -C INPUT -p tcp --dport "$$port" -j ACCEPT &> /dev/null; then
                    echo "Rule for port $$port does not exist, adding it..."
                    chroot /host iptables -A INPUT -p tcp --dport "$$port" -j ACCEPT
                  else
                    echo "Rule for port $$port already exists, skipping..."
                  fi
                done
                # List the final rules in the INPUT chain
                chroot /host iptables -S INPUT
              securityContext:
                privileged: true
              volumeMounts:
              - mountPath: /host
                name: host-root
      - target:
          group: apps
          version: v1
          kind: Deployment
          name: splunk-otel-collector-k8s-cluster-receiver
        patch: |-
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --config=/extra/config.yaml
          - op: add
            path: /spec/template/spec/shareProcessNamespace
            value: true
          - op: add
            path: /spec/template/spec/containers/-
            value:
              name: configmap-reloader
              image: ${registry_host}/platform/configmap-reload:v0.16.0
              args:
                - --volume-dir=/extra/
                - --target-process-name=otelcol
              volumeMounts:
              - name: extra-config
                mountPath: /extra
                readOnly: true
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                capabilities:
                  add: ["SYS_PTRACE"]
      - target:
          group: opentelemetry.io
          version: v1alpha1
          kind: Instrumentation
          name: splunk-otel-collector
        patch: |-
          - op: replace
            path: /spec/apacheHttpd/image
            value: ${registry_host}/platform/splunk-otel-collector-images@sha256:f0eaaf30ca1ae394ab094f40b02c9bf35b48a760745c72a5699cce116fdaeb0f
          - op: replace
            path: /spec/dotnet/image
            value: ${registry_host}/platform/splunk-otel-collector-images@sha256:ed0b34c31269fb10c30ffa8e8f362ee3321a89573fc31a34a20363aa9d8ac523
          - op: replace
            path: /spec/nginx/image
            value: ${registry_host}/platform/splunk-otel-collector-images@sha256:f0eaaf30ca1ae394ab094f40b02c9bf35b48a760745c72a5699cce116fdaeb0f
          - op: replace
            path: /spec/java/image
            value: ${registry_host}/platform/splunk-otel-collector-images@sha256:05d538de3f760e205cf2080f60a617f9c5824cef6edc9b204d75047065888ea3
          - op: replace
            path: /spec/go/image
            value: ${registry_host}/platform/splunk-otel-collector-images@sha256:e1d18ea0ed2b569dcb1f389829628dbbd94fe3b385a117b1392ecb7be9d38cc3
          - op: replace
            path: /spec/nodejs/image
            value: ${registry_host}/platform/splunk-otel-collector-images@sha256:d332cac00fd3db1bafd9440aff8f7a668a724e8bdc70c44e617fad554fe62576
          - op: replace
            path: /spec/python/image
            value: ${registry_host}/platform/splunk-otel-collector-images@sha256:d488c507e0cacc64b81423b96f6e53b30f2602a0e4bcc614658182f6aa13d5b4
      images:
      - name: busybox:latest
        newName: ${registry_host}/platform/splunk-otel-collector-images
        digest: sha256:5004e39241f2f89009d6e08d17e7438a42eacc8c623fd785c44e529c8e1ea3c2
      - name: ghcr.io/open-telemetry/opentelemetry-operator/opentelemetry-operator:0.134.0
        newName: ${registry_host}/platform/splunk-otel-collector-images
        digest: sha256:f8efc961eae71626938170ffc852e35794a4ccbaffa832d802f75bf23a4ffd6e
      - name: ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:v0.132.0
        newName: ${registry_host}/platform/splunk-otel-collector-images
        digest: sha256:cccf8fd3b622082b389315c1e3fb54c08323c59ce2da9153d2904f4f7efb0990
      - name: quay.io/brancz/kube-rbac-proxy:v0.19.1
        newName: ${registry_host}/platform/splunk-otel-collector-images
        digest: sha256:e215791c9889f3ac41e35cf351b53477d8f7e7d22c3ec865c895671e0f9127d2
      - name: quay.io/signalfx/splunk-otel-collector:0.138.0
        newName: ${registry_host}/platform/splunk-otel-collector-images
        digest: sha256:956c43d9b105d053b46c9a4b6a586b6fb33c4783f99aa63069cd294d562ce24e
