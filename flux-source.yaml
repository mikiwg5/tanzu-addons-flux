apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: k8s-addons-flux
  namespace: flux-system
spec:
  interval: 1m
  # Replace <registry-ip-or-host> with your actual Harbor registry (e.g. 10.0.0.50:30443)
  url: oci://<registry-ip-or-host>/platform/k8s-addons-flux
  ref:
    tag: latest
  # If Harbor requires credentials to pull the artifact:
  secretRef:
    name: harbor-registry-credentials
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: addons-bootstrap
  namespace: flux-system
spec:
  interval: 5m
  path: ./
  prune: true
  wait: true
  sourceRef:
    kind: OCIRepository
    name: k8s-addons-flux
  postBuild:
    substituteFrom:
    - kind: Secret
      name: substitute-config
      optional: false
