apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- helm-repo.yaml
# addons-config.yaml is intentionally excluded:
# It contains the substitute-config Secret template, which Flux reads BEFORE
# applying manifests. If Flux manages this Secret, a circular substitution
# problem occurs (secret overwrites itself with template strings).
# Create/update substitute-config manually with: kubectl create secret generic substitute-config ...
