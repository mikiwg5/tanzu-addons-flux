replicaCount: 3
resources:
    limits:
      cpu: 200m
      memory: 450Mi
    requests:
      cpu: 100m
      memory: 250Mi

idracConfig: |
  address: 0.0.0.0
  port: 9348
  timeout: 90
  hosts:
    default:
      username: ${idrac_username}
      password: ${idrac_password}
      
  metrics:
    all: true
