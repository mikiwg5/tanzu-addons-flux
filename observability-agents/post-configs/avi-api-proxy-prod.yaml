apiVersion: v1
kind: Secret
metadata:
  name: avi-api-proxy-prod-config
  namespace: otel-gateway
stringData:
  controller: ${avi_controller}
  username: ${avi_username}
  password: ${avi_password}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: avi-api-proxy-prod
  namespace: otel-gateway
  labels:
    app: avi-api-proxy
spec:
  selector:
    matchLabels:
      app: avi-api-proxy
  replicas: 2
  template:
    metadata:
      labels:
        app: avi-api-proxy
    spec:
      containers:
      - name: avi-api-proxy
        image: ${registry_host}/platform/avi-api-proxy:latest
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 100m
            memory: 100Mi
        env:
        - name: AVI_CONTROLLER
          valueFrom:
            secretKeyRef:
              name: avi-api-proxy-prod-config
              key: controller
        - name: AVI_USERNAME
          valueFrom:
            secretKeyRef:
              name: avi-api-proxy-prod-config
              key: username
        - name: AVI_PASSWORD
          valueFrom:
            secretKeyRef:
              name: avi-api-proxy-prod-config
              key: password
        ports:
        - containerPort: 8080
          name: avi-api-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: avi-api-proxy-prod
  namespace: otel-gateway
  labels:
    app: avi-api-proxy
spec:
  selector:
    app: avi-api-proxy
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP
---


