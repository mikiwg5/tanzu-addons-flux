apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netscaler-adc-username
  namespace: otel-gateway
spec:
  refreshPolicy: OnChange
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: external-secrets-cluster-secret-store
  target:
    name: netscaler-adc-username
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: k8s-common/cloud/monitoring/citrix-netscaler
      property: username
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netscaler-adc-password
  namespace: otel-gateway
spec:
  refreshPolicy: OnChange
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: external-secrets-cluster-secret-store
  target:
    name: netscaler-adc-password
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: k8s-common/cloud/monitoring/citrix-netscaler
      property: password
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: netscaler-adc
  namespace: otel-gateway
spec:
  mode: statefulset
  managementState: managed
  replicas: 2
  config:
    receivers:
      prometheus/netscaler-adc:
        config:
          scrape_configs:
          - job_name: vpx2_metrics_direct
            metrics_path: /metrics
            params:
              profilename:
              - ns_analytics_time_series_profile_prom
            basic_auth:
              username_file: /netscaler-adc/username/username
              password_file: /netscaler-adc/password/password
            scheme: https
            tls_config:
              insecure_skip_verify: true
            scrape_interval: 30s
            scrape_timeout: 15s
            follow_redirects: true
            file_sd_configs:
            - files:
              - /etc/netscaler-adc-exporter/netscaler-adc-targets.yaml
      prometheus/agent:
        config:
          scrape_configs:
          - job_name: otel-agent
            scrape_interval: 20s
            static_configs:
            - targets:
              - 0.0.0.0:8889

    processors:
      batch:
        send_batch_max_size: 8192
      memory_limiter:
        check_interval: 2s
        limit_mib: 750
      resourcedetection:
        detectors:
        - env
        - system
        override: true
        system:
          hostname_sources:
          - os
        timeout: 15s
      resource/add_agent_k8s:
        attributes:
        - action: insert
          key: k8s.pod.name
          value: $${K8S_POD_NAME}
        - action: insert
          key: k8s.pod.uid
          value: $${K8S_POD_UID}
        - action: insert
          key: k8s.namespace.name
          value: $${K8S_NAMESPACE}
      resource:
        attributes:
        - action: insert
          key: k8s.node.name
          value: $${K8S_NODE_NAME}
        - action: upsert
          key: k8s.cluster.name
          value: ${datacenter}-${tenant}-tkc
      k8sattributes/metrics:
        extract:
          annotations:
          - from: pod
            key: splunk.com/sourcetype
          - from: namespace
            key: splunk.com/metricsIndex
            tag_name: com.splunk.index
          - from: pod
            key: splunk.com/metricsIndex
            tag_name: com.splunk.index
          metadata: []
        filter:
          node_from_env_var: K8S_NODE_NAME
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.node.name
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: ip
        - sources:
          - from: connection

    extensions:
      bearertokenauth:
        filename: /secrets/bearertokens/tokens
      file_storage/persistent_queue:
        directory: /otel-persistent-queue
        create_directory: true
        compaction:
          on_rebound: true
          directory: /otel-persistent-queue/tmp/
          rebound_needed_threshold_mib: 1000
          rebound_trigger_threshold_mib: 100
          check_interval: 30s
    exporters:
      otlp/mdc1-prod:
        endpoint: grpc.mdc1-otel-gateway.safaricomet.net:443
        write_buffer_size: 10485760
        timeout: 60s
        auth:
          authenticator: bearertokenauth
        tls:
          insecure_skip_verify: true
        sending_queue:
          enabled: true
          storage: file_storage/persistent_queue
      otlp/mdc2-prod:
        endpoint: grpc.mdc2-otel-gateway.safaricomet.net:443
        write_buffer_size: 10485760
        timeout: 60s
        auth:
          authenticator: bearertokenauth
        tls:
          insecure_skip_verify: true
        sending_queue:
          enabled: true
          storage: file_storage/persistent_queue
      debug:
        verbosity: detailed

    service:
      extensions:
      - bearertokenauth
      - file_storage/persistent_queue
      pipelines:
        metrics:
          receivers:
          - prometheus/netscaler-adc
          processors:
          - memory_limiter
          - batch
          exporters:
          - otlp/mdc1-prod
          - otlp/mdc2-prod
        metrics/agent:
          receivers:
          - prometheus/agent
          processors:
          - memory_limiter
          - batch
          - resource/add_agent_k8s
          - resourcedetection
          - resource
          exporters:
          - otlp/mdc1-prod
          - otlp/mdc2-prod
      telemetry:
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: '0.0.0.0'
                  port: 8889
  image: ${registry_host}/platform/opentelemetry-collector-contrib:0.138.0
  env:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: spec.nodeName
  - name: K8S_NODE_IP
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: status.hostIP
  - name: K8S_POD_IP
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: status.podIP
  - name: K8S_POD_NAME
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.name
  - name: K8S_POD_UID
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.uid
  - name: K8S_NAMESPACE
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.namespace
  volumes:
  - name: netscaler-adc-targets-config
    configMap:
      name: ${datacenter}-netscaler-adc-targets
  - configMap:
      items:
      - key: ca-certificates.crt
        path: ca-certificates.crt
      name: safaricomet.net
    name: etc-ssl-certs
  - name: bearertokens
    secret:
      secretName: bearertokens
  - name: netscaler-adc-username
    secret:
      secretName: netscaler-adc-username
  - name: netscaler-adc-password
    secret:
      secretName: netscaler-adc-password
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/component: opentelemetry-collector
            app.kubernetes.io/instance: otel-gateway.netscaler-adc
        topologyKey: kubernetes.io/hostname
  targetAllocator:
    enabled: false
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: persistent-queue
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 50Gi
  volumeMounts:
  - name: persistent-queue
    mountPath: /otel-persistent-queue
  - name: etc-ssl-certs
    mountPath: /etc/ssl/certs
  - name: bearertokens
    mountPath: /secrets/bearertokens
  - name: netscaler-adc-username
    mountPath: /netscaler-adc/username
    readOnly: true
  - name: netscaler-adc-password
    mountPath: /netscaler-adc/password
    readOnly: true
  - name: netscaler-adc-targets-config
    mountPath: /etc/netscaler-adc-exporter
