apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ecs-s3-1
  namespace: default
  labels:
    kubernetes.io/service-name: ecs-s3
addressType: IPv4
ports:
- name: http
  appProtocol: http
  protocol: TCP
  port: 80
endpoints:
- addresses:
  - "10.4.20.89"
  conditions:
    ready: true
- addresses:
  - "10.4.120.89"
  conditions:
    ready: true
---
apiVersion: v1
kind: Service
metadata:
  name: ecs-s3
  namespace: default
spec:
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
