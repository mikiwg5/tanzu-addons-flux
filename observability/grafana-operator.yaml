apiVersion: v1
kind: Namespace
metadata:
  name: grafana-operator
  labels:
    pod-security.kubernetes.io/enforce: privileged
    kyverno.io/exclude-rule: "true"
spec: {}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: grafana-operator
spec:
  interval: 1m
  timeout: 20m
  chart:
    spec:
      chart: grafana-operator
      version: 4.9.23
      sourceRef:
        kind: HelmRepository
        name: local-harbor-helm-repo
        namespace: flux-system
      interval: 5m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  releaseName: grafana-operator
  dependsOn:
  - name: kyverno
    namespace: kyverno
  - name: adcs-issuer
    namespace: cert-manager
  - name: postgresql-ha
    namespace: postgresql-ha
  valuesFrom:
  - kind: ConfigMap
    name: grafana-operator-values
  postRenderers:
  - kustomize:
      images:
      - name: docker.io/bitnami/grafana-operator:5.18.0-debian-12-r5
        newName: ${registry_host}/platform/grafana-operator-images
        digest: sha256:df3474e92fbf9fd00ff159e41a5834cddb0f1639c74abe8f0d9a340edbcba022
      - name: docker.io/bitnami/grafana:12.0.2-debian-12-r0
        newName: ${registry_host}/platform/grafana-operator-images
        digest: sha256:49866ff5c122168fe9a24f6631945eac988ca29c48ae0bc3cb2804d6bdb7467f
