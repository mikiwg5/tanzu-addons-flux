global:
  security:
    allowInsecureImages: true
operator:
  enabled: true
  replicaCount: 1
  resourcesPreset: small
  prometheus:
    serviceMonitor:
      enabled: true
grafana:
  enabled: true
  replicaCount: 1
  resourcesPreset: small
  service:
    type: ClusterIP
  labels:
    instance: grafana-one
  config:
    feature_toggles:
      externalServiceAccounts: "true"
      traceQLStreaming: "true"
    plugins:
      allow_loading_unsigned_plugins: vmware-ariaoperations-datasource
    database:
      type: "postgres"
      host: "postgresql-ha-pgpool.postgresql-ha.svc:5432"
      name: "grafana"
      user: ${pg_user}
      password: ${pg_password}
    auth:
      disable_login_form: "false"
    auth.ldap:
      enabled: "false"   # AD/LDAP disabled for test
    smtp:
      enabled: "false"   # SMTP disabled for test
  ingress:
    enabled: true
    ingressClassName: contour
    host: ${grafana_ip}
    annotations:
      projectcontour.io/response-timeout: 180s
      projectcontour.io/websocket-routes: /
    tls: false
  persistence:
    enabled: false
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  extraVolumeMounts: []
  extraVolumes: []
