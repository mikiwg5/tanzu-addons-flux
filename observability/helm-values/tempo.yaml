reportingEnabled: false
tempo:
  structuredConfig:
    stream_over_http_enabled: true
overrides:
  defaults:
    metrics_generator:
      generate_native_histograms: both
      processors:
      - service-graphs
      - span-metrics
      - local-blocks
    ingestion:
      rate_strategy: local
      rate_limit_bytes: 150000000
      burst_size_bytes: 200000000
      max_traces_per_user: 100000
    global:
      max_bytes_per_trace: 500000000
server:
  logLevel: info
  grpc_server_max_recv_msg_size: 16777216
  grpc_server_max_send_msg_size: 16777216
ingester:
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
  persistence:
    enabled: true
    size: 10Gi
  config:
    complete_block_timeout: 1h
    flush_check_period: 30s
    flush_all_on_shutdown: true
metricsGenerator:
  enabled: true
  kind: StatefulSet
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
  config:
    processor:
      local_blocks:
        filter_server_spans: false
        flush_to_storage: true
        complete_block_timeout: 24h
      service_graphs:
        wait: 30s
        max_items: 500000
        enable_virtual_node_label: true
        dimensions:
        - k8s.cluster.name
        - k8s.namespace.name
        - service.name
      span_metrics:
        enable_target_info: true
        dimensions:
        - k8s.cluster.name
        - k8s.namespace.name
        - http.method
        - http.status_code
        - http.route
        - http.flavor
    storage:
      remote_write_add_org_id_header: false
      remote_write:
      - url: http://victoria-metrics-victoria-metrics-cluster-vminsert.victoria-metrics.svc.cluster.local:8480/insert/0/prometheus
        send_exemplars: true
      # - url: http://mimir-gateway.mimir.svc.cluster.local/api/v1/push
      #   send_exemplars: true
distributor:
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
compactor:
  replicas: 1
  config:
    compaction:
      block_retention: 168h
querier:
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
queryFrontend:
  replicas: 1
  config:
    max_outstanding_per_tenant: 20000
    query_shards: 20
    metrics:
      max_duration: 72h
      query_backend_after: 24h
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
traces:
  otlp:
    http:
      enabled: true
    grpc:
      enabled: true
storage:
  trace:
    backend: s3
    s3:
      bucket: ${datacenter}-tempo-store
      endpoint: ecs-s3.default.svc.cluster.local
      list_blocks_concurrency: 200
      insecure: true
      access_key: ${tempo_s3_access_key}
      secret_key: ${tempo_s3_secret_key}
    blocklist_poll: 5m
    blocklist_poll_concurrency: 50
    blocklist_poll_fallback: true
    blocklist_poll_tenant_concurrency: 5
    empty_tenant_deletion_enabled: true
memcached:
  enabled: true
  replicas: 1
  extraArgs:
  - --conn-limit=4096
  - --memory-limit=7168
memcachedExporter:
  enabled: true
metaMonitoring:
  serviceMonitor:
    enabled: true
prometheusRule:
  enabled: true
