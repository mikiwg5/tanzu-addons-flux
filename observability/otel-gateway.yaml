apiVersion: v1
kind: Namespace
metadata:
  name: otel-gateway
  labels:
    pod-security.kubernetes.io/enforce: privileged
    kyverno.io/exclude-rule: "true"
spec: {}
---
kind: ExternalSecret
apiVersion: external-secrets.io/v1
metadata:
  name: ${datacenter}-${tenant}-bearertoken
  namespace: otel-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: external-secrets-cluster-secret-store
  target:
    name: otel-gateway-bearertokens
    creationPolicy: Owner
  data:
  - secretKey: tokens
    remoteRef:
      key: k8s/${datacenter}-${tenant}/bearertokens
      property: tokens
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-gateway
  namespace: otel-gateway
spec:
  mode: statefulset
  managementState: managed
  replicas: 12
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            max_recv_msg_size_mib: 50
            auth:
              authenticator: bearertokenauth
      prometheus/agent:
        config:
          scrape_configs:
          - job_name: otel-agent
            scrape_interval: 10s
            static_configs:
            - targets:
              - 0.0.0.0:8889

    processors:
      batch:
        send_batch_size: 4096
        timeout: 200ms
        send_batch_max_size: 8192
      memory_limiter:
        check_interval: 2s
        limit_mib: 10240
      resourcedetection:
        detectors:
        - env
        - system
        override: true
        system:
          hostname_sources:
          - os
        timeout: 15s
      resource/add_agent_k8s:
        attributes:
        - action: insert
          key: k8s.pod.name
          value: $${K8S_POD_NAME}
        - action: insert
          key: k8s.pod.uid
          value: $${K8S_POD_UID}
        - action: insert
          key: k8s.namespace.name
          value: $${K8S_NAMESPACE}
      resource:
        attributes:
        - action: insert
          key: k8s.node.name
          value: $${K8S_NODE_NAME}
        - action: upsert
          key: k8s.cluster.name
          value: ${datacenter}-${tenant}-tkc
      k8sattributes/metrics:
        extract:
          annotations:
          - from: pod
            key: splunk.com/sourcetype
          - from: namespace
            key: splunk.com/metricsIndex
            tag_name: com.splunk.index
          - from: pod
            key: splunk.com/metricsIndex
            tag_name: com.splunk.index
          metadata: []
        filter:
          node_from_env_var: K8S_NODE_NAME
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.node.name
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: ip
        - sources:
          - from: connection
      transform/span_attribute:
        error_mode: ignore
        trace_statements:
        - context: span
          statements:
          - set(attributes["http.method"], attributes["http.request.method"])
          - set(attributes["http.status_code"], attributes["http.response.status_code"])
          - set(attributes["http.flavor"], attributes["network.protocol.version"])
          - delete_key(attributes, "http.request.method")
          - delete_key(attributes, "http.response.status_code")
          - delete_key(attributes, "network.protocol.version")

    extensions:
      bearertokenauth:
        filename: /secrets/bearertokens/tokens
      file_storage/persistent_queue:
        directory: /otel-persistent-queue
        create_directory: true
        compaction:
          on_rebound: true
          directory: /otel-persistent-queue/tmp/
          rebound_needed_threshold_mib: 1000
          rebound_trigger_threshold_mib: 100
          check_interval: 30s
    exporters:
      otlp/tempo:
        endpoint: tempo-distributor.tempo.svc.cluster.local:4317
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          max_elapsed_time: 2h
        sending_queue:
          enabled: true
          storage: file_storage/persistent_queue
      otlphttp/victoria-logs-gateway:
        endpoint: http://victoria-logs-gateway.victoria-logs.svc.cluster.local:9429/insert/opentelemetry
        retry_on_failure:
          enabled: true
          max_elapsed_time: 2h
        sending_queue:
          enabled: true
          storage: file_storage/persistent_queue
      prometheusremotewrite/victoria-metrics:
        endpoint: http://victoria-metrics-gateway.victoria-metrics.svc.cluster.local:8429/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
        send_metadata: true
        # Uncomment below to enable WAL for Prometheus Remote Write exporter
        # requires high cpu/memory requests/limits and larger persistent volume
        # wal:
        #   directory: /otel-persistent-queue/wal
      otlp/mdc1-prod:
        endpoint: grpc.mdc1-otel-gateway.safaricomet.net:443
        write_buffer_size: 10485760
        timeout: 60s
        auth:
          authenticator: bearertokenauth
        tls:
          insecure_skip_verify: true
        retry_on_failure:
          enabled: true
          max_elapsed_time: 2h
        sending_queue:
          enabled: true
          storage: file_storage/persistent_queue
      otlp/mdc2-prod:
        endpoint: grpc.mdc2-otel-gateway.safaricomet.net:443
        write_buffer_size: 10485760
        timeout: 60s
        auth:
          authenticator: bearertokenauth
        tls:
          insecure_skip_verify: true
        retry_on_failure:
          enabled: true
          max_elapsed_time: 2h
        sending_queue:
          enabled: true
          storage: file_storage/persistent_queue
      debug:
        verbosity: detailed

    service:
      extensions:
      - file_storage/persistent_queue
      - bearertokenauth
      pipelines:
        metrics:
          receivers:
          - otlp
          processors:
          - memory_limiter
          - batch
          exporters:
          - prometheusremotewrite/victoria-metrics
        metrics/agent:
          receivers:
          - prometheus/agent
          processors:
          - memory_limiter
          - batch
          - resource/add_agent_k8s
          - resourcedetection
          - resource
          exporters:
          - otlp/mdc1-prod
          - otlp/mdc2-prod
        logs:
          receivers:
          - otlp
          processors:
          - memory_limiter
          - batch
          exporters:
          - otlphttp/victoria-logs-gateway
        traces:
          receivers:
          - otlp
          processors:
          - transform/span_attribute
          - memory_limiter
          - batch
          exporters:
          - otlp/tempo
      telemetry:
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: '0.0.0.0'
                  port: 8889
  image: ${registry_host}.safaricomet\.net/oss/opentelemetry-collector-contrib:0.138.0
  env:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: spec.nodeName
  - name: K8S_NODE_IP
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: status.hostIP
  - name: K8S_POD_IP
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: status.podIP
  - name: K8S_POD_NAME
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.name
  - name: K8S_POD_UID
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.uid
  - name: K8S_NAMESPACE
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.namespace
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  resources:
    limits:
      cpu: 2000m
      memory: 12Gi
    requests:
      cpu: 1000m
      memory: 1500Mi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/component: opentelemetry-collector
            app.kubernetes.io/instance: otel-gateway.otel-gateway
        topologyKey: kubernetes.io/hostname
  ingress:
    type: ingress
    ruleType: subdomain
    annotations:
      projectcontour.io/response-timeout: 90s
      cert-manager.io/issuer: "adcsclusterissuer"
      cert-manager.io/issuer-kind: "ClusterAdcsIssuer"
      cert-manager.io/issuer-group: "adcs.certmanager.csf.nokia.com"
      cert-manager.io/common-name: otlp-http.${datacenter}-otel-gateway.safaricomet.net
    hostname: ${datacenter}-otel-gateway.safaricomet.net
    ingressClassName: contour
    tls:
    - secretName: otel-gateway-tls
      hosts:
      - otlp-http.${datacenter}-otel-gateway.safaricomet.net
      - otlp-grpc.${datacenter}-otel-gateway.safaricomet.net
      - grpc.${datacenter}-otel-gateway.safaricomet.net
      - otel-gateway.safaricomet.net
  volumes:
  - configMap:
      items:
      - key: ca-certificates.crt
        path: ca-certificates.crt
      name: safaricomet.net
    name: etc-ssl-certs
  - secret:
      secretName: otel-gateway-bearertokens
    name: bearertokens
  targetAllocator:
    enabled: false
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: persistent-queue
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 50Gi
  volumeMounts:
  - name: persistent-queue
    mountPath: /otel-persistent-queue
  - name: etc-ssl-certs
    mountPath: /etc/ssl/certs
  - name: bearertokens
    mountPath: /secrets/bearertokens
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: otel-gateway-collector
  namespace: otel-gateway
spec:
  virtualhost:
    fqdn: grpc.${datacenter}-otel-gateway.safaricomet.net
    tls:
      secretName: otel-gateway-tls
  routes:
  - conditions:
    - prefix: /
    services:
    - name: otel-gateway-collector
      port: 4317
      protocol: h2c
