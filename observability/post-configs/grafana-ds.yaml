---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoria-metrics-ds
  namespace: grafana-operator
spec:
  datasource:
    access: proxy
    type: prometheus
    basicAuth: false
    isDefault: false
    editable: false
    jsonData:
      exemplarTraceIdDestinations:
      - datasourceUid: tempo
        name: traceID
      cacheLevel: Medium
      httpMethod: POST
      incrementalQuerying: false
      manageAlerts: true
      timeout: 300
    name: victoria-metrics
    uid: victoria-metrics
    url: http://victoria-metrics-victoria-metrics-cluster-vmselect.victoria-metrics.svc.cluster.local:8481/select/0/prometheus
  resyncPeriod: 1m
  instanceSelector:
    matchLabels:
      instance: grafana-one
---
