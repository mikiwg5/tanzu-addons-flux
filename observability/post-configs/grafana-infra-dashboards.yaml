apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: infra
  namespace: grafana-operator
spec:
  instanceSelector:
    matchLabels:
      instance: grafana-one
  resyncPeriod: 1m
  title: Infra
  uid: infra
  permissions: |
    {
      "items": [
        {
          "role": "Admin",
          "permission": 4
        },
        {
          "role": "Editor",
          "permission": 2
        }
      ]
    }
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: physical-server-stats
  namespace: grafana-operator
  labels:
    instance: grafana-one
spec:
  folderRef: infra
  uid: physical-server-stats
  resyncPeriod: 1m
  instanceSelector:
    matchLabels:
      instance: grafana-one
  configMapRef:
    name: physical-server-stats-dashboard
    key: json
---
apiVersion: grafana.integreatly.org/v1beta1
