apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: kubernetes
  namespace: grafana-operator
spec:
  instanceSelector:
    matchLabels:
      instance: grafana-one
  resyncPeriod: 1m
  title: Kubernetes
  uid: kubernetes
  permissions: |
    {
      "items": [
        {
          "role": "Admin",
          "permission": 4
        },
        {
          "role": "Editor",
          "permission": 2
        }
      ]
    }
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: high-level-cluster-stats
  namespace: grafana-operator
  labels:
    instance: grafana-one
spec:
  folderRef: kubernetes
  uid: high-level-cluster-stats
  resyncPeriod: 1m
  instanceSelector:
    matchLabels:
      instance: grafana-one
  configMapRef:
    name: high-level-cluster-stats-dashboard
    key: json
---
