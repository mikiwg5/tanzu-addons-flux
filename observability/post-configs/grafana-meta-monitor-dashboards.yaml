apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: meta-monitoring
  namespace: grafana-operator
spec:
  instanceSelector:
    matchLabels:
      instance: grafana-one
  resyncPeriod: 1m
  title: Meta Monitoring
  uid: meta-monitoring
  permissions: |
    {
      "items": [
        {
          "role": "Admin",
          "permission": 4
        },
        {
          "role": "Editor",
          "permission": 2
        }
      ]
    }
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: victorialogs-cluster
  namespace: grafana-operator
  labels:
    instance: grafana-one
spec:
  folderRef: meta-monitoring
  uid: victorialogs-cluster
  resyncPeriod: 1m
  instanceSelector:
    matchLabels:
      instance: grafana-one
  configMapRef:
    name: victorialogs-cluster-dashboard
    key: json
---
apiVersion: grafana.integreatly.org/v1beta1
