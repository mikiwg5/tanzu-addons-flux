apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: noc
  namespace: grafana-operator
spec:
  instanceSelector:
    matchLabels:
      instance: grafana-one
  resyncPeriod: 1m
  title: NOC-Dashboard
  uid: noc
  permissions: |
    {
      "items": [
        {
          "role": "Admin",
          "permission": 4
        },
        {
          "role": "Editor",
          "permission": 2
        },
        {
          "role": "Viewer",
          "permission": 1
        }
      ]
    }
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: noc-high-level-cluster-stats
  namespace: grafana-operator
  labels:
    instance: grafana-one
spec:
  folderRef: noc
  uid: noc-high-level-cluster-stats
  resyncPeriod: 1m
  instanceSelector:
    matchLabels:
      instance: grafana-one
  configMapRef:
    name: noc-high-level-cluster-stats-dashboard
    key: json
---
