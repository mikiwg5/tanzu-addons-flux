apiVersion: v1
kind: Namespace
metadata:
  name: victoria-metrics
  labels:
    pod-security.kubernetes.io/enforce: privileged
    kyverno.io/exclude-rule: "true"
spec: {}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: victoria-metrics
spec:
  interval: 1m
  timeout: 40m
  chart:
    spec:
      chart: victoria-metrics-cluster
      version: 0.28.4
      sourceRef:
        kind: HelmRepository
        name: local-harbor-helm-repo
        namespace: flux-system
      interval: 5m
  releaseName: victoria-metrics
  dependsOn:
  - name: kyverno
    namespace: kyverno
  - name: kube-prometheus
    namespace: kube-prometheus
  valuesFrom:
  - kind: ConfigMap
    name: victoria-metrics-values
  postRenderers:
  - kustomize:
      images:
      - name: victoriametrics/vminsert:v1.126.0-cluster
        newName: ${registry_host}.safaricomet.net/platform/victoria-metrics-cluster-images
        digest: sha256:70839fbd67fab6cc00f647a6370d7f0587aabb24cc18da8b90b5b24b6e647622
      - name: victoriametrics/vmselect:v1.126.0-cluster
        newName: ${registry_host}.safaricomet.net/platform/victoria-metrics-cluster-images
        digest: sha256:3b89721d28fad348beff693e94afdb425230fed22f1c56ae6229211b7258b442
      - name: victoriametrics/vmstorage:v1.126.0-cluster
        newName: ${registry_host}.safaricomet.net/platform/victoria-metrics-cluster-images
        digest: sha256:6d5735396c0cff693a3c1de6190a86c2bb19b1aff0f16f1c7396904e5974d425
