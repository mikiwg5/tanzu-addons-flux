apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmalert
  namespace: victoria-metrics
spec:
  interval: 1m
  timeout: 40m
  chart:
    spec:
      chart: victoria-metrics-alert
      version: 0.25.5
      sourceRef:
        kind: HelmRepository
        name: local-harbor-helm-repo
        namespace: flux-system
      interval: 5m
  releaseName: vmalert
  dependsOn:
  - name: kyverno
    namespace: kyverno
  - name: victoria-metrics
    namespace: victoria-metrics
  - name: alertmanager
    namespace: alertmanager
  valuesFrom:
  - kind: ConfigMap
    name: victoria-metrics-vmalert-values
  postRenderers:
  - kustomize:
      images:
      - name: victoriametrics/vmalert:v1.126.0
        newName: ${registry_host}/platform/victoria-metrics-alert-images
        digest: sha256:a7c40bbabb87df5c30915c91951fc743f1b8eeab3ad84fd11bb00e0e5a794898
