apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: goharbor
spec:
  interval: 1m
  timeout: 40m
  chart:
    spec:
      chart: harbor
      version: 1.17.1
      sourceRef:
        kind: HelmRepository
        name: local-harbor-helm-repo
        namespace: flux-system
      interval: 5m
  releaseName: harbor
  dependsOn:
  - name: kube-prometheus
    namespace: kube-prometheus
  - name: external-secrets
    namespace: external-secrets
  valuesFrom:
  - kind: ConfigMap
    name: harbor-values
  postRenderers:
  - kustomize:
      images:
      - name: goharbor/harbor-core:v2.13.1
        newName: ${registry_host}/platform/harbor-images
        digest: sha256:bed040aef1073b3a8d516f782d449f4df7c0bb8d049f0b3c84ff65c085b29981
      - name: goharbor/harbor-db:v2.13.1
        newName: ${registry_host}/platform/harbor-images
        digest: sha256:5e1001dea0ef214a3f96d3c5357d60e1491079cf1a360c4b295281bb1ca941c1
      - name: goharbor/harbor-jobservice:v2.13.1
        newName: ${registry_host}/platform/harbor-images
        digest: sha256:58201de077ed160c479fd00d3f6e46163c6c68dc274cea65b562c34b6ae82046
      - name: goharbor/harbor-portal:v2.13.1
        newName: ${registry_host}/platform/harbor-images
        digest: sha256:d83ecad7f48bff6f8d0f73d78d6c3f1ad3dd27338529af5455e7c4cb103d1fe1
      - name: goharbor/harbor-registryctl:v2.13.1
        newName: ${registry_host}/platform/harbor-images
        digest: sha256:15941dc70b10a2e5f883fb30d5d78d944f9b2dda9c7e44adfc21ce58f9263a39
      - name: goharbor/redis-photon:v2.13.1
        newName: ${registry_host}/platform/harbor-images
        digest: sha256:08800edda4dee50316dff960bc3a7b622dab440e2ffa867835160326f9ff22cf
      - name: goharbor/registry-photon:v2.13.1
        newName: ${registry_host}/platform/harbor-images
        digest: sha256:8a87c4edbf56aefba89608dcafdec59f0d8da6513ce89f8d85c9c8f189ecf3f9
      - name: goharbor/trivy-adapter-photon:v2.13.1
        newName: ${registry_host}/platform/harbor-images
        digest: sha256:9ebc79c4fcaa63a9285967797e7fdf834af76694b4551f999ab716d0bdc58316
